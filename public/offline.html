<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2d6a2d">
  <title>Garden Manager – Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f7f0; color: #2d4a2d; }
    nav { background: #2d6a2d; padding: 0.75rem 1.25rem; }
    nav a { color: #fff; text-decoration: none; font-weight: bold; font-size: 1.1rem; }
    main { max-width: 600px; margin: 6rem auto; padding: 0 1rem; text-align: center; }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { color: #2d6a2d; margin-bottom: 0.75rem; }
    p { color: #666; margin-bottom: 1.5rem; }
    a.btn {
      display: inline-block; background: #2d6a2d; color: #fff;
      padding: 0.6rem 1.5rem; border-radius: 4px; text-decoration: none;
    }
    a.btn:hover { background: #1e4f1e; }
  </style>
</head>
<body>
  <nav><a href="/">🌱 Garden Manager</a></nav>
  <main>
    <p class="icon" aria-hidden="true">🌱</p>
    <h1>You're offline</h1>
    <p>Please check your connection and try again.</p>
    <a href="/" class="btn">Try again</a>
  </main>
</body>
</html>
